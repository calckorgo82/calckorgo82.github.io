# > twitter_username:
github_username: calckorgo82
codepen_username: 
dev_username: 
linkedin_username: dannykim3
twitter_username: 

# ABOUT ME SECTION
# show_aboutme_card:
# > setting this to true, will display the About Me section
# > setting this to false, will omit the About Me section
show_aboutme_card: true
# about_me_title: The will be displayed as the title in the About Me section
about_me_title: About Me
# about_me_description: This will be displayed under the title.
about_me_description: I am currently a senior at Harvard, studying statistics on a data science track. After graduation, I'm thrilled to be joining Capital One as an Associate Product Manager 🚀 and can't wait to see where this exciting career takes me. One thing that has always driven me is my passion for building products 📱. Whether it's working on a coding project or collaborating with a team to bring an idea to life, I love the satisfaction of seeing something tangible and valuable come together. In my free time, I also enjoy learning about the stories of successful entrepreneurs and playing around with data 📊 (check out some of my data projects on my GitHub!). And when I need a break from all the number-crunching, you can usually find me cheering on one of my favorite New York sports teams 🏒!
# SKILLS SECTION
# show_skills_card:
# > setting this to true, will display the Skills section
# > setting this to false, will omit the Skills section
show_skills_card: true
# about_me_title: The will be displayed as the title in the Skills section
skills_title: Skills

# TIMELINE SECTION
# show_timeline_card:
# > setting this to true, will display the Timeline section
# > setting this to false, will omit the Timeline section
show_timeline_card: true
# timeline_title: The will be displayed as the title in the Timeline section
timeline_title: Education & Experience
# cv_download_link: The link where you host your cv.
# > e.g. you share your cv on your dropbox, then add the dropbox link here
cv_download_link: https://docs.google.com/document/d/1cpMrJvwcI7nbI6PIc6L_Y1voTY-AsPqNezL-66AR0j0/edit?usp=sharing

# PROJECTS SECTION
# show_projects_card:
